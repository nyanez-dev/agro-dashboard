<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allaria Agro — Soja Sustentable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f0f4f8; min-height: 100vh; }
.hdr { background: #0a2240; color: #fff; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.hdr-left { display: flex; align-items: center; gap: 10px; }
.hdr-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
.hdr-title { font-size: 15px; font-weight: 700; }
.hdr-sub { font-size: 12px; color: #94a3b8; margin-left: 6px; }
.hdr-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.btn-refresh,.btn-export,.btn-edit { padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif; border: none; }
.btn-refresh { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; }
.btn-export { background: #1a7a3e; color: #fff; font-weight: 600; }
.btn-edit { background: #92400e; color: #fff; font-weight: 600; }
.btn-edit.active { background: #dc2626; }
.btn-refresh:hover { background: rgba(255,255,255,0.18); }
.btn-export:hover { background: #156333; }
.last-update { font-size: 11px; color: #64748b; }

.tabs { display: flex; background: #fff; border-bottom: 1px solid #e2e8f0; padding: 0 28px; overflow-x: auto; }
.tab { padding: 14px 20px; border: none; background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: #64748b; border-bottom: 3px solid transparent; font-family: 'Inter', sans-serif; transition: all 0.15s; white-space: nowrap; }
.tab.active { color: #0a2240; border-bottom-color: #0a2240; font-weight: 700; }
.tab:hover:not(.active) { color: #1e293b; }

.content { max-width: 1400px; margin: 0 auto; padding: 24px 28px; }
.stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 18px; min-width: 110px; flex: 1; }
.stat-val { font-size: 22px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: #64748b; margin-top: 3px; }

.filters { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
input[type=text] { padding: 8px 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px; color: #1e293b; background: #fff; outline: none; font-family: 'Inter', sans-serif; width: 220px; }
input[type=text]:focus { border-color: #0a2240; }

.multi-select-wrap { position: relative; min-width: 160px; }
.multi-select-btn { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px; color: #1e293b; background: #fff; outline: none; font-family: 'Inter', sans-serif; cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; gap: 6px; white-space: nowrap; overflow: hidden; }
.multi-select-btn:focus,.multi-select-btn.open { border-color: #0a2240; }
.multi-select-btn .arrow { font-size: 10px; color: #94a3b8; flex-shrink: 0; }
.multi-select-dropdown { display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 100; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.10); min-width: 100%; max-height: none; overflow: visible; padding: 0; }
.multi-select-dropdown.open { display: block; }
.multi-select-option { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; font-size: 13px; color: #1e293b; user-select: none; }
.multi-select-option:hover { background: #f0f7ff; }
.multi-select-option input[type=checkbox] { accent-color: #0a2240; width: 14px; height: 14px; cursor: pointer; }
.drop-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px 4px; border-bottom: 1px solid #f1f5f9; gap: 8px; }
.drop-search { flex: 1; padding: 5px 8px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 12px; font-family: 'Inter', sans-serif; outline: none; color: #1e293b; }
.drop-search:focus { border-color: #0a2240; }
.drop-clear-btn { font-size: 11px; color: #94a3b8; background: none; border: none; cursor: pointer; white-space: nowrap; padding: 2px 4px; }
.drop-clear-btn:hover { color: #dc2626; }
.drop-options { max-height: 200px; overflow-y: auto; }

.btn-clear { padding: 8px 14px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; color: #64748b; cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif; align-self: flex-end; }
.btn-clear:hover { background: #f8fafc; }

.table-wrap { border-radius: 10px; border: 1px solid #e2e8f0; overflow: hidden; overflow-x: auto; background: #fff; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #0a2240; color: #fff; padding: 11px 14px; text-align: left; font-weight: 600; font-size: 11px; white-space: nowrap; letter-spacing: 0.03em; }
td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; color: #1e293b; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: #f8fafc; }
tr:hover td { background: #f0f7ff; }
tr.clickable { cursor: pointer; }

.badge { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.badge-ok { background: #d1fae5; color: #065f46; }
.badge-warn { background: #fef3c7; color: #92400e; }
.badge-err { background: #fee2e2; color: #991b1b; }
.badge-info { background: #dbeafe; color: #1e40af; }
.badge-na { background: #f1f5f9; color: #475569; }
.badge-web { background: #dbeafe; color: #1e40af; }
.badge-mail { background: #fef3c7; color: #92400e; }

.footer-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-top: 10px; flex-wrap: wrap; gap: 8px; }
.loading { text-align: center; padding: 50px; color: #64748b; font-size: 14px; }
.error { text-align: center; padding: 40px; color: #dc2626; font-size: 13px; line-height: 1.6; }
.num { text-align: right; font-variant-numeric: tabular-nums; }
.bold { font-weight: 600; }
.mono { font-family: monospace; font-size: 12px; color: #64748b; }
.muted { color: #64748b; }
.green { color: #1a4a2e; }

/* Ficha expandida */
.ficha { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; margin: 12px 0; padding: 20px; display: none; }
.ficha.open { display: block; }
.ficha-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 16px; }
.ficha-field label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 3px; }
.ficha-field .val { font-size: 14px; color: #1e293b; }
.ficha-field a { color: #1a5a9a; text-decoration: none; font-size: 13px; }
.ficha-field a:hover { text-decoration: underline; }
.ficha-section { border-top: 1px solid #f1f5f9; padding-top: 14px; margin-top: 14px; }
.ficha-section h3 { font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 10px; }
.comment-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
.comment-meta { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
.comment-author { color: #1a5a9a; font-weight: 600; }
.comment-date { color: #94a3b8; }
.comment-text { font-size: 13px; color: #1e293b; }
.comment-input { display: flex; gap: 8px; margin-top: 10px; }
.comment-input input { flex: 1; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: 'Inter', sans-serif; }
.comment-input button { background: #0a2240; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; font-family: 'Inter', sans-serif; }
.vto-input { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.vto-input input[type=date] { padding: 6px 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: 'Inter', sans-serif; }
.vto-input button { background: #0a2240; color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; }
.edit-only { display: none; }
.edit-mode .edit-only { display: flex; }

/* Exportador colors */
.badge-exp-LDC { background: #dbeafe; color: #1e3a8a; }
.badge-exp-MOA { background: #fce7f3; color: #9d174d; }
.badge-exp-COFCO { background: #fef3c7; color: #78350f; }
.badge-exp-Bunge { background: #d1fae5; color: #064e3b; }
.badge-exp-AGD { background: #ede9fe; color: #4c1d95; }
.badge-exp-Dreyfus { background: #ffedd5; color: #7c2d12; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-dot"></div>
    <span class="hdr-title">Allaria Agro</span>
    <span class="hdr-sub">Soja sustentable</span>

    <div class="filter-group"><label>Buscar</label><input type="text" id="g-search" placeholder="Productor, campo, estado..." oninput="onFilterG()"></div>

    <div class="filter-group"><label>Via</label><div class="multi-select-wrap" id="wrap-g-via"><button type="button" class="multi-select-btn" onclick="toggleDropdown('g-via')"><span id="label-g-via">Todas</span><span class="arrow">&#9660;</span></button><div class="multi-select-dropdown" id="drop-g-via"></div></div></div>

    <div class="filter-group"><label>Buscar</label><input type="text" id="e-search" placeholder="Vendedor, campo, localidad..." oninput="onFilterE()"></div>

    <div class="filter-group"><label>Exportador</label><div class="multi-select-wrap" id="wrap-e-exp"><button type="button" class="multi-select-btn" onclick="toggleDropdown('e-exp')"><span id="label-e-exp">Todos</span><span class="arrow">&#9660;</span></button><div class="multi-select-dropdown" id="drop-e-exp"></div></div></div>
    <div class="filter-group"><label>Tipo</label><div class="multi-select-wrap" id="wrap-e-tipo"><button type="button" class="multi-select-btn" onclick="toggleDropdown('e-tipo')"><span id="label-e-tipo">Todos</span><span class="arrow">&#9660;</span></button><div class="multi-select-dropdown" id="drop-e-tipo"></div></div></div>

<!-- INFORMACION DE CAMPOS -->
<div id="panel-c" class="content" style="display:none">
  <div class="stats" id="stats-c"></div>
  <div class="filters">
    <div class="filter-group"><label>Buscar</label><input type="text" id="c-search" placeholder="Razon social, campo, CUIT..." oninput="renderC()"></div>
    <div class="filter-group"><label>Provincia</label><div class="multi-select-wrap" id="wrap-c-prov"><button type="button" class="multi-select-btn" onclick="toggleDropdown('c-prov')"><span id="label-c-prov">Todas</span><span class="arrow">&#9660;</span></button><div class="multi-select-dropdown" id="drop-c-prov"></div></div></div>
    <div class="filter-group"><label>Estado</label><div class="multi-select-wrap" id="wrap-c-estado"><button type="button" class="multi-select-btn" onclick="toggleDropdown('c-estado')"><span id="label-c-estado">Todos</span><span class="arrow">&#9660;</span></button><div class="multi-select-dropdown" id="drop-c-estado"></div></div></div>
    <button class="btn-clear" onclick="clearC()">Limpiar filtros</button>
  </div>
  <div id="c-table"><div class="loading">Cargando datos...</div></div>

<script>
const SHEET_ID = '1-yVmx3D5q-liA0twVVcaRWYJicmZpVBAOXrdPX8jAto';
const API_KEY = 'AIzaSyA_PNd_cf9LQVUFKSKXVi7CRINBKbCuUEM';
const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/allariaagro.com.ar/s/AKfycbxPRkT1GSAS5dKLHIA2wHOOOhrz5prERHCt7HH3AaEj-SU3u9-_qhv9Y18LvP1CDCV3Dg/exec';
const CAMP_DEFAULT = '2526';
const EDIT_PASSWORD = 'compliance2026';

let allG=[], allE=[], allC=[], allNotas=[];
let currentTab='g', editMode=false;

// Helper para buscar columnas por nombre parcial (maneja nombres con espacios/acentos)
function g(r,partial){const keys=Object.keys(r);const k=keys.find(x=>x.toUpperCase().includes(partial.toUpperCase()));return k?r[k]:'';}
const sel = {'g-camp':new Set(),'g-exp':new Set(),'g-via':new Set(),'e-camp':new Set(),'e-vend':new Set(),'e-exp':new Set(),'e-tipo':new Set(),'c-prov':new Set(),'c-estado':new Set()};

// ── COLORES ──
const TIPO_COLORS = {'EPA':{bg:'#d1fae5',color:'#065f46'},'2BSvs':{bg:'#fee2e2',color:'#991b1b'},'RTRS':{bg:'#ede9fe',color:'#5b21b6'},'ISCC':{bg:'#fef3c7',color:'#92400e'}};
const EXP_COLORS = {'LDC':{bg:'#dbeafe',color:'#1e3a8a'},'MOA':{bg:'#fce7f3',color:'#9d174d'},'COFCO':{bg:'#fef3c7',color:'#78350f'},'Bunge':{bg:'#d1fae5',color:'#064e3b'},'AGD':{bg:'#ede9fe',color:'#4c1d95'},'Dreyfus':{bg:'#ffedd5',color:'#7c2d12'}};

function tipoBadge(t){if(!t)return'\u2014';const c=TIPO_COLORS[t]||{bg:'#f1f5f9',color:'#475569'};return `<span class="badge" style="background:${c.bg};color:${c.color}">${t}</span>`;}
function expBadge(e){if(!e)return'\u2014';const c=EXP_COLORS[e]||{bg:'#f1f5f9',color:'#334155'};return `<span class="badge" style="background:${c.bg};color:${c.color}">${e}</span>`;}
function viaBadge(v){if(!v)return'\u2014';return `<span class="badge ${v.toLowerCase()==='web'?'badge-web':'badge-mail'}">${v}</span>`;}
function statusBadge(s){const m={'Completo':'badge-ok','Falta RENSPA':'badge-err','RENSPA vencida':'badge-warn','Falta evidencia':'badge-err','Falta poligono':'badge-err','Incompleto':'badge-err'};return `<span class="badge ${m[s]||'badge-na'}">${s}</span>`;}

// ── UTILS ──
function toObjs(rows){if(!rows||rows.length<2)return[];const h=rows[0].map(k=>k.replace(/[\n\r]+/g,' ').replace(/\s+/g,' ').trim());return rows.slice(1).map(r=>Object.fromEntries(h.map((k,i)=>[k,(r[i]||'').toString().trim()])));}
async function fetchSheet(name,startRow){const range=startRow?`${name}!A${startRow}:Z`:`${name}!A:Z`;const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`;const res=await fetch(url);if(!res.ok)throw new Error('HTTP '+res.status);return toObjs((await res.json()).values||[]);}
function uniq(arr){return[...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es'));}
function parseNum(v){if(!v)return 0;const c=typeof v==='string'?v.replace(/,/g,''):v;const n=parseFloat(c);return isNaN(n)?0:n;}
function fmt(v){if(!v)return'\u2014';const clean=typeof v==='string'?v.replace(/,/g,''):v;const n=parseFloat(clean);return isNaN(n)?(v||'\u2014'):n.toLocaleString('es-AR',{maximumFractionDigits:2});}
function statCard(val,lbl,color){return `<div class="stat"><div class="stat-val" style="color:${color}">${val}</div><div class="stat-lbl">${lbl}</div></div>`;}

// ── EDIT MODE ──
function toggleEditMode(){
  if(!editMode){
    const pw=prompt('Ingresa la contrasena de Compliance:');
    if(pw!==EDIT_PASSWORD){alert('Contrasena incorrecta.');return;}
    editMode=true;
    document.body.classList.add('edit-mode');
    document.getElementById('btn-edit').textContent='Salir de edicion';
    document.getElementById('btn-edit').classList.add('active');
  } else {
    editMode=false;
    document.body.classList.remove('edit-mode');
    document.getElementById('btn-edit').textContent='Modo edicion';
    document.getElementById('btn-edit').classList.remove('active');
  }
}

// ── NOTAS ──
async function loadNotas(){
  return new Promise((resolve)=>{
    const cb='_notasCb'+Date.now();
    window[cb]=function(d){allNotas=d.notas||[];delete window[cb];resolve();};
    const s=document.createElement('script');
    s.src=APPS_SCRIPT_URL+'?callback='+cb;
    s.onerror=function(){console.warn('No se pudieron cargar notas');allNotas=[];resolve();};
    document.body.appendChild(s);
    setTimeout(()=>{if(window[cb]){allNotas=[];delete window[cb];resolve();}},5000);
  });
}
async function saveNota(cuit,campo,tipo,valor,autor){
  try{await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({cuit,campo,tipo,valor,autor})});
  await loadNotas();}catch(e){alert('Error guardando nota: '+e.message);}
}
function getNotas(cuit,campo,tipo){return allNotas.filter(n=>n.CUIT==cuit&&n.CAMPO==campo&&(!tipo||n.TIPO==tipo));}
function getVtoRenspa(cuit,campo){const n=getNotas(cuit,campo,'vto_renspa');return n.length?n[n.length-1].VALOR:'';}

function renspaStatus(cuit,campo){
  const vto=getVtoRenspa(cuit,campo);
  if(!vto)return{status:'Sin fecha',cls:'badge-na'};
  const parts=vto.split(/[-/]/);
  let d;
  if(parts[0].length===4)d=new Date(parts[0],parts[1]-1,parts[2]);
  else d=new Date(parts[2],parts[1]-1,parts[0]);
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.floor((d-today)/(1000*60*60*24));
  if(diff<0)return{status:'Vencida ('+vto+')',cls:'badge-err'};
  if(diff<=30)return{status:'Vence pronto ('+vto+')',cls:'badge-warn'};
  return{status:'Vigente ('+vto+')',cls:'badge-ok'};
}

// ── MULTI-SELECT ──
function toggleDropdown(id){const drop=document.getElementById('drop-'+id);const btn=drop.previousElementSibling;const isOpen=drop.classList.contains('open');document.querySelectorAll('.multi-select-dropdown.open').forEach(d=>{d.classList.remove('open');d.previousElementSibling.classList.remove('open');});if(!isOpen){drop.classList.add('open');btn.classList.add('open');}}
document.addEventListener('click',e=>{if(!e.target.closest('.multi-select-wrap')){document.querySelectorAll('.multi-select-dropdown.open').forEach(d=>{d.classList.remove('open');d.previousElementSibling.classList.remove('open');});}});

function buildDropdown(id,vals,renderOption){
  const drop=document.getElementById('drop-'+id);
  const count=sel[id].size;
  const clearBtn=count>0?`<button class="drop-clear-btn" onclick="clearFilter('${id}')" title="Limpiar seleccion">x Limpiar (${count})</button>`:`<span class="drop-clear-btn" style="cursor:default;color:#e2e8f0">x Limpiar</span>`;
  const optionsHtml=vals.map(v=>{const checked=sel[id].has(v)?'checked':'';const optHtml=renderOption?renderOption(v):v;return `<label class="multi-select-option"><input type="checkbox" value="${v}" ${checked} onchange="onCheck('${id}',this)"><span>${optHtml}</span></label>`;}).join('');
  drop.innerHTML=`<div class="drop-header"><input class="drop-search" type="text" placeholder="Buscar..." oninput="filterDropdown('${id}',this.value)" onclick="event.stopPropagation()">${clearBtn}</div><div class="drop-options" id="opts-${id}">${optionsHtml}</div>`;
  updateLabel(id);
}
function filterDropdown(id,q){const opts=document.getElementById('opts-'+id);if(!opts)return;opts.querySelectorAll('.multi-select-option').forEach(el=>{el.style.display=el.querySelector('span').textContent.toLowerCase().includes(q.toLowerCase())?'':'none';});}
function clearFilter(id){sel[id].clear();const opts=document.getElementById('opts-'+id);if(opts)opts.querySelectorAll('input[type=checkbox]').forEach(cb=>{cb.checked=false;});updateLabel(id);if(id.startsWith('g-')){cascadeG();renderG();}else if(id.startsWith('e-')){cascadeE();renderE();}else{renderC();}}
function onCheck(id,cb){if(cb.checked)sel[id].add(cb.value);else sel[id].delete(cb.value);updateLabel(id);if(id.startsWith('g-')){cascadeG();renderG();}else if(id.startsWith('e-')){cascadeE();renderE();}else{renderC();}}
function updateLabel(id){const s=sel[id];const lbl=document.getElementById('label-'+id);if(!lbl)return;if(s.size===0)lbl.textContent='Todos';else if(s.size===1)lbl.textContent=[...s][0];else lbl.textContent=s.size+' seleccionados';}

// ── CASCADA GESTIONES ──
function cascadeG(){const camps=sel['g-camp'];const base=camps.size?allG.filter(r=>camps.has(r['Campana']||r['Campaña'])):allG;const exps=uniq(base.map(r=>r['Exportador']));const vias=uniq(base.map(r=>r['Via web o mail']||r['Vía web o mail']));[...sel['g-exp']].forEach(v=>{if(!exps.includes(v))sel['g-exp'].delete(v);});[...sel['g-via']].forEach(v=>{if(!vias.includes(v))sel['g-via'].delete(v);});buildDropdown('g-exp',exps,e=>expBadge(e));buildDropdown('g-via',vias);}

// ── CASCADA HABILITACIONES ──
function cascadeE(){const camps=sel['e-camp'];const base=camps.size?allE.filter(r=>camps.has(r['Campana']||r['Campaña'])):allE;const vends=uniq(base.map(r=>r['Vendedor']));const exps=uniq(base.map(r=>r['Exportador']));const tipos=uniq(base.map(r=>r['Tipo']));[...sel['e-vend']].forEach(v=>{if(!vends.includes(v))sel['e-vend'].delete(v);});[...sel['e-exp']].forEach(v=>{if(!exps.includes(v))sel['e-exp'].delete(v);});[...sel['e-tipo']].forEach(v=>{if(!tipos.includes(v))sel['e-tipo'].delete(v);});buildDropdown('e-vend',vends);buildDropdown('e-exp',exps,e=>expBadge(e));buildDropdown('e-tipo',tipos,t=>tipoBadge(t));}

// ── GESTIONES ──
function filterG(){const q=document.getElementById('g-search').value.toLowerCase();const camps=sel['g-camp'];const exps=sel['g-exp'];const vias=sel['g-via'];return allG.filter(r=>(!q||Object.values(r).some(v=>v.toLowerCase().includes(q)))&&(!camps.size||camps.has(r['Campana']||r['Campaña']))&&(!exps.size||exps.has(r['Exportador']))&&(!vias.size||vias.has(r['Via web o mail']||r['Vía web o mail'])));}
function onFilterG(){renderG();}
function renderG(){
  const f=filterG();
  const web=f.filter(r=>(r['Via web o mail']||r['Vía web o mail']||'').toLowerCase()==='web').length;
  const exps=uniq(f.map(r=>r['Exportador'])).length;
  document.getElementById('stats-g').innerHTML=statCard(f.length,'Registros','#1a4a2e')+statCard(web,'Via web','#1a5a9a')+statCard(f.length-web,'Via mail','#92400e')+statCard(exps,'Exportadores','#64748b');
  if(!f.length){document.getElementById('g-table').innerHTML='<div class="loading">Sin resultados para los filtros seleccionados.</div>';document.getElementById('g-footer').innerHTML='';return;}
  const thead=`<thead><tr><th>Productor</th><th>Campo</th><th>Estado</th><th>Via</th><th>Exportador</th><th>Campana</th></tr></thead>`;
  const rows=f.map(r=>`<tr><td class="bold">${r['Productor']||'\u2014'}</td><td>${r['Campo']||'\u2014'}</td><td class="muted" style="max-width:260px">${r['Estado']||'\u2014'}</td><td>${viaBadge(r['Via web o mail']||r['Vía web o mail'])}</td><td>${expBadge(r['Exportador'])}</td><td class="muted">${r['Campana']||r['Campaña']||'\u2014'}</td></tr>`).join('');
  document.getElementById('g-table').innerHTML=`<div class="table-wrap"><table>${thead}<tbody>${rows}</tbody></table></div>`;
  document.getElementById('g-footer').innerHTML=`<span>Mostrando ${f.length} de ${allG.length} registros</span>`;
}
function clearG(){document.getElementById('g-search').value='';Object.keys(sel).filter(k=>k.startsWith('g-')).forEach(k=>sel[k].clear());sel['g-camp'].add(CAMP_DEFAULT);cascadeG();buildDropdown('g-camp',uniq(allG.map(r=>r['Campana']||r['Campaña'])));updateLabel('g-camp');renderG();}

// ── HABILITACIONES ──
function filterE(){const q=document.getElementById('e-search').value.toLowerCase();const camps=sel['e-camp'];const vends=sel['e-vend'];const exps=sel['e-exp'];const tipos=sel['e-tipo'];return allE.filter(r=>(!q||Object.values(r).some(v=>v.toString().toLowerCase().includes(q)))&&(!camps.size||camps.has(r['Campana']||r['Campaña']))&&(!vends.size||vends.has(r['Vendedor']))&&(!exps.size||exps.has(r['Exportador']))&&(!tipos.size||tipos.has(r['Tipo'])));}
function onFilterE(){renderE();}
function renderE(){
  const f=filterE();
  const has=f.reduce((s,r)=>s+parseNum(r['Has sustentables']),0);
  const ton=f.reduce((s,r)=>s+parseNum(r['Rendimiento en ton']),0);
  const exps=uniq(f.map(r=>r['Exportador'])).length;
  document.getElementById('stats-e').innerHTML=statCard(f.length,'Registros','#1a4a2e')+statCard(has.toLocaleString('es-AR',{maximumFractionDigits:0}),'Has. sustentables','#1a5a9a')+statCard(ton.toLocaleString('es-AR',{maximumFractionDigits:0}),'Toneladas','#1a4a2e')+statCard(exps,'Exportadores','#64748b');
  if(!f.length){document.getElementById('e-table').innerHTML='<div class="loading">Sin resultados para los filtros seleccionados.</div>';document.getElementById('e-footer').innerHTML='';return;}
  const thead=`<thead><tr><th>Vendedor</th><th>CUIT</th><th>Campo</th><th>Localidad</th><th>Exportador</th><th>Tipo</th><th>Campana</th><th style="text-align:right">Has.</th><th style="text-align:right">Coef.</th><th style="text-align:right">Toneladas</th></tr></thead>`;
  const rows=f.map(r=>`<tr><td class="bold" style="white-space:nowrap">${r['Vendedor']||'\u2014'}</td><td class="mono">${r['CUIT']||'\u2014'}</td><td>${r['Campo']||'\u2014'}</td><td class="muted">${r['Localidad en exportador']||'\u2014'}</td><td>${expBadge(r['Exportador'])}</td><td>${tipoBadge(r['Tipo'])}</td><td class="muted">${r['Campana']||r['Campaña']||'\u2014'}</td><td class="num">${fmt(r['Has sustentables'])}</td><td class="num muted">${fmt(r['Coef. rendimiento'])}</td><td class="num bold green">${fmt(r['Rendimiento en ton'])}</td></tr>`).join('');
  document.getElementById('e-table').innerHTML=`<div class="table-wrap"><table>${thead}<tbody>${rows}</tbody></table></div>`;
  document.getElementById('e-footer').innerHTML=`<span>Mostrando ${f.length} de ${allE.length} registros</span>`;
}
function clearE(){document.getElementById('e-search').value='';Object.keys(sel).filter(k=>k.startsWith('e-')).forEach(k=>sel[k].clear());sel['e-camp'].add(CAMP_DEFAULT);cascadeE();buildDropdown('e-camp',uniq(allE.map(r=>r['Campana']||r['Campaña'])));updateLabel('e-camp');renderE();}

// ── INFORMACION DE CAMPOS ──
function getFieldStatus(r){
  const cuit=g(r,'CUIT');
  const campo=g(r,'NOMBRE DEL CAMPO');
  const renspa=r['N\u00b0 RENSPA']||r['N° RENSPA']||'';
  const cred=g(r,'CREDENCIAL RENSPA');
  const poly=r['POLIGONO del Per\u00edmetro total del Campo (subir archivo .KMZ)']||r['POLIGONO del Perímetro total del Campo (subir archivo .KMZ)']||'';
  const evid=g(r,'EVIDENCIA');
  const vto=getVtoRenspa(cuit,campo);
  if(vto){const rs=renspaStatus(cuit,campo);if(rs.status.includes('Vencida'))return 'RENSPA vencida';}
  if(!renspa&&!cred)return'Falta RENSPA';
  if(!poly)return'Falta poligono';
  if(!evid)return'Falta evidencia';
  return'Completo';
}

function filterC(){
  const q=document.getElementById('c-search').value.toLowerCase();
  const provs=sel['c-prov'];
  const estados=sel['c-estado'];
  return allC.filter(r=>{
    const status=getFieldStatus(r);
    return(!q||Object.values(r).some(v=>v.toLowerCase().includes(q)))&&(!provs.size||provs.has(r['PROVINCIA']))&&(!estados.size||estados.has(status));
  });
}

function renderC(){
  const f=filterC();
  const completos=f.filter(r=>getFieldStatus(r)==='Completo').length;
  const provs=uniq(f.map(r=>g(r,'PROVINCIA'))).length;
  const hasTot=f.reduce((s,r)=>s+parseNum(g(r,'TOTALES DEL CAMPO')),0);
  document.getElementById('stats-c').innerHTML=statCard(f.length,'Campos','#1a4a2e')+statCard(completos,'Completos','#065f46')+statCard(f.length-completos,'Pendientes','#991b1b')+statCard(provs,'Provincias','#64748b');

  // Poblar filtros
  const allStatuses=uniq(allC.map(r=>getFieldStatus(r)));
  const allProvs=uniq(allC.map(r=>g(r,'PROVINCIA')));
  if(!document.getElementById('opts-c-prov'))buildDropdown('c-prov',allProvs);
  if(!document.getElementById('opts-c-estado'))buildDropdown('c-estado',allStatuses,s=>statusBadge(s));

  if(!f.length){document.getElementById('c-table').innerHTML='<div class="loading">Sin resultados.</div>';document.getElementById('c-footer').innerHTML='';return;}
  const thead=`<thead><tr><th>Razon social</th><th>CUIT</th><th>Campo</th><th>Localidad</th><th>Provincia</th><th>Has. totales</th><th>Has. productivas</th><th>RENSPA</th><th>Estado</th></tr></thead>`;
  const rows=f.map((r,i)=>{
    const cuit=g(r,'CUIT');
    const campo=g(r,'NOMBRE DEL CAMPO');
    const status=getFieldStatus(r);
    const rs=renspaStatus(cuit,campo);
    const renspa=r['N\u00b0 RENSPA']||r['N° RENSPA']||'';
    return `<tr class="clickable" onclick="toggleFicha(${i})">
      <td class="bold">${r['RAZON SOCIAL']||'\u2014'}</td>
      <td class="mono">${cuit}</td>
      <td>${campo}</td>
      <td class="muted">${r['LOCALIDAD']||'\u2014'}</td>
      <td class="muted">${r['PROVINCIA']||'\u2014'}</td>
      <td class="num">${fmt(g(r,'TOTALES DEL CAMPO'))}</td>
      <td class="num">${fmt(g(r,'PRODUCTIVAS'))}</td>
      <td><span class="badge ${rs.cls}">${rs.status}</span></td>
      <td>${statusBadge(status)}</td>
    </tr><tr><td colspan="9" style="padding:0;border:none;"><div class="ficha" id="ficha-${i}">${buildFicha(r,i)}</div></td></tr>`;
  }).join('');
  document.getElementById('c-table').innerHTML=`<div class="table-wrap"><table>${thead}<tbody>${rows}</tbody></table></div>`;
  document.getElementById('c-footer').innerHTML=`<span>Mostrando ${f.length} de ${allC.length} campos</span>`;
}

function buildFicha(r,idx){
  const cuit=g(r,'CUIT');
  const campo=g(r,'NOMBRE DEL CAMPO');
  const cred=g(r,'CREDENCIAL RENSPA');
  const poly=r['POLIGONO del Per\u00edmetro total del Campo (subir archivo .KMZ)']||r['POLIGONO del Perímetro total del Campo (subir archivo .KMZ)']||'';
  const evid=g(r,'EVIDENCIA');
  const tipoEvid=g(r,'TIPO DE EVIDENCIA');
  const mail=r['MAIL DE CONTACTO PRODUCTOR']||r['MAIL DE CONTACTO PRODUCTOR\n']||'';
  const rs=renspaStatus(cuit,campo);
  const vto=getVtoRenspa(cuit,campo);
  const comentarios=getNotas(cuit,campo,'comentario');

  let html=`<div class="ficha-grid">
    <div class="ficha-field"><label>Razon social</label><div class="val bold">${g(r,'RAZON SOCIAL')}</div></div>
    <div class="ficha-field"><label>Tipo sociedad</label><div class="val">${g(r,'TIPO SOCIEDAD')}</div></div>
    <div class="ficha-field"><label>CUIT</label><div class="val mono">${cuit}</div></div>
    <div class="ficha-field"><label>Mail contacto</label><div class="val">${mail?`<a href="mailto:${mail}">${mail}</a>`:'\u2014'}</div></div>
    <div class="ficha-field"><label>Departamento</label><div class="val">${g(r,'DEPARTAMENTO')}</div></div>
    <div class="ficha-field"><label>Provincia</label><div class="val">${g(r,'PROVINCIA')}</div></div>
    <div class="ficha-field"><label>Localidad</label><div class="val">${g(r,'LOCALIDAD')}</div></div>
    <div class="ficha-field"><label>Cod. localidad ARCA</label><div class="val">${g(r,'LOCALIDAD ARCA')}</div></div>
  </div>`;

  html+=`<div class="ficha-section"><h3>Documentacion</h3><div class="ficha-grid">
    <div class="ficha-field"><label>N° RENSPA</label><div class="val">${r['N\u00b0 RENSPA']||r['N° RENSPA']||'\u2014'}</div></div>
    <div class="ficha-field"><label>Credencial RENSPA</label><div class="val">${cred?`<a href="${cred}" target="_blank">Ver documento</a>`:'No adjunto'}</div></div>
    <div class="ficha-field"><label>Estado RENSPA</label><div class="val"><span class="badge ${rs.cls}">${rs.status}</span></div>
      <div class="vto-input edit-only" style="margin-top:6px"><input type="date" id="vto-${idx}" value="${vto||''}"><button onclick="saveVto(${idx})">Guardar fecha</button></div>
    </div>
    <div class="ficha-field"><label>Poligono KMZ</label><div class="val">${poly?`<a href="${poly}" target="_blank">Descargar KMZ</a>`:'No adjunto'}</div></div>
    <div class="ficha-field"><label>Tipo evidencia</label><div class="val">${tipoEvid||'\u2014'}</div></div>
    <div class="ficha-field"><label>Evidencia</label><div class="val">${evid?`<a href="${evid}" target="_blank">Ver evidencia</a>`:'No adjunto'}</div></div>
    <div class="ficha-field"><label>PCUS 1</label><div class="val">${r['PCUS 1']||r['PCUS 1 ']||'\u2014'}</div></div>
  </div></div>`;

  html+=`<div class="ficha-section"><h3>Comentarios del equipo</h3>`;
  comentarios.forEach(c=>{html+=`<div class="comment-box"><div class="comment-meta"><span class="comment-author">${c.AUTOR}</span><span class="comment-date">${c.FECHA}</span></div><div class="comment-text">${c.VALOR}</div></div>`;});
  html+=`<div class="comment-input edit-only"><input type="text" id="cmt-${idx}" placeholder="Escribir comentario..."><button onclick="saveComment(${idx})">Guardar</button></div></div>`;
  return html;
}

function toggleFicha(i){const el=document.getElementById('ficha-'+i);if(el)el.classList.toggle('open');}

async function saveVto(idx){
  const f=filterC();const r=f[idx];if(!r)return;
  const cuit=g(r,'CUIT');const campo=g(r,'NOMBRE DEL CAMPO');
  const val=document.getElementById('vto-'+idx).value;
  if(!val){alert('Selecciona una fecha.');return;}
  await saveNota(cuit,campo,'vto_renspa',val,'Compliance');
  renderC();
}

async function saveComment(idx){
  const f=filterC();const r=f[idx];if(!r)return;
  const cuit=g(r,'CUIT');const campo=g(r,'NOMBRE DEL CAMPO');
  const input=document.getElementById('cmt-'+idx);
  const val=input.value.trim();
  if(!val){alert('Escribi un comentario.');return;}
  const autor=prompt('Tu nombre:');
  if(!autor)return;
  await saveNota(cuit,campo,'comentario',val,autor);
  input.value='';
  renderC();
}

function clearC(){document.getElementById('c-search').value='';Object.keys(sel).filter(k=>k.startsWith('c-')).forEach(k=>sel[k].clear());buildDropdown('c-prov',uniq(allC.map(r=>g(r,'PROVINCIA'))));buildDropdown('c-estado',uniq(allC.map(r=>getFieldStatus(r))),s=>statusBadge(s));renderC();}

// ── TABS ──
function switchTab(t){currentTab=t;['g','e','c'].forEach(x=>{document.getElementById('panel-'+x).style.display=x===t?'':'none';document.getElementById('tab-'+x).className='tab'+(x===t?' active':'');});}

// ── EXPORT ──
function exportExcel(){
  let data,name;
  if(currentTab==='g'){data=filterG();name='Gestiones';}
  else if(currentTab==='e'){data=filterE();name='Habilitaciones';}
  else{data=filterC();name='Informacion_Campos';}
  if(!data.length){alert('No hay datos para exportar.');return;}
  const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,name);
  const date=new Date().toLocaleDateString('es-AR').replace(/\//g,'-');
  XLSX.writeFile(wb,`${name}-${date}.xlsx`);
}

// ── CARGA ──
async function loadData(){
  document.getElementById('last-update').textContent='Actualizando...';
  document.getElementById('g-table').innerHTML='<div class="loading">Cargando...</div>';
  document.getElementById('e-table').innerHTML='<div class="loading">Cargando...</div>';
  document.getElementById('c-table').innerHTML='<div class="loading">Cargando...</div>';
  try{
    const [gData,eData,c]=await Promise.all([fetchSheet('Gestiones'),fetchSheet('Exportadores'),fetchSheet('BASE DATOS FINAL',2)]);
    allG=gData;allE=eData;allC=c;
    try{await loadNotas();}catch(e){console.warn('Notas no disponibles:',e);}

    sel['g-camp'].add(CAMP_DEFAULT);sel['e-camp'].add(CAMP_DEFAULT);
    buildDropdown('g-camp',uniq(allG.map(r=>r['Campana']||r['Campaña'])));
    buildDropdown('e-camp',uniq(allE.map(r=>r['Campana']||r['Campaña'])));
    updateLabel('g-camp');updateLabel('e-camp');
    cascadeG();cascadeE();
    buildDropdown('c-prov',uniq(allC.map(r=>g(r,'PROVINCIA'))));
    buildDropdown('c-estado',uniq(allC.map(r=>getFieldStatus(r))),s=>statusBadge(s));
    renderG();renderE();renderC();
    const now=new Date();
    document.getElementById('last-update').textContent='Actualizado '+now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    const msg=`<div class="error">No se pudieron cargar los datos.<br><small>${e.message}</small></div>`;
    document.getElementById('g-table').innerHTML=msg;
    document.getElementById('e-table').innerHTML=msg;
    document.getElementById('c-table').innerHTML=msg;
    document.getElementById('last-update').textContent='Error al cargar';
  }
}
loadData();
</script>
